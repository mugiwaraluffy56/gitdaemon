name: Bug Report
description: Something isn't working correctly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: gd version
      description: Output of `gd --version`
      placeholder: "gd 0.8.0"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: Output of `rustc --version`
      placeholder: "rustc 1.78.0 (9b00956e5 2024-04-29)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4, Ubuntu 22.04, ..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug
      placeholder: |
        1. Create a repo with `git init`
        2. Run `gd init && gd up`
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Debug logs
      description: |
        Output of `RUST_LOG=debug gd up` (sanitise any secrets or personal info)
      render: text

  - type: textarea
    id: config
    attributes:
      label: gd.yml (if relevant)
      description: Your configuration file (remove any API keys)
      render: yaml
