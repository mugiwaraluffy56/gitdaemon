name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search existing issues to see if it has already been proposed.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: |
        Describe the problem you're trying to solve. "I want X" is less useful than
        "When I do Y, I have to manually Z, which is tedious because…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include example config or CLI flags if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why do they fall short?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Commit message generation
        - Secret scanning
        - Hooks
        - IPC / CLI commands
        - Configuration
        - Auto-sync / rebase
        - Performance
        - Documentation
        - Other
    validations:
      required: true
